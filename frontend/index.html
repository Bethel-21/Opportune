<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Opportunity Tracker helps you organize jobs, internships, scholarships, and opportunities in one place with AI-powered information extraction and deadline reminders."
    />
    <meta name="author" content="Opportunity Tracker" />

    <meta
      name="keywords"
      content="opportunities, jobs, internships, scholarships, fellowships, AI tracker, application tracker"
    />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:title" content="Opportunity Tracker" />
    <meta
      property="og:description"
      content="Track your jobs, internships, scholarships, and opportunities with AI-powered organization."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="Opportunity Tracker" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="/" />
    <meta property="twitter:title" content="Opportunity Tracker" />
    <meta
      property="twitter:description"
      content="Never lose track of opportunities, deadlines, and applications again."
    />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <meta
      name="apple-mobile-web-app-title"
      content="Opportunity Tracker"
    />
    <meta name="format-detection" content="telephone=no" />

    <title>Opportune</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
